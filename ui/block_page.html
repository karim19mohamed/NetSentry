<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blocked — NetSentry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1   { color: #c0392b; font-size: 1.75rem; margin-bottom: 12px; }
    p    { color: #666; line-height: 1.6; }
    code {
      display: inline-block;
      margin-top: 16px;
      background: #f5f5f5;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #333;
      word-break: break-all;
    }
    .brand { margin-top: 32px; font-size: 0.8rem; color: #bbb; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Access Blocked</h1>
    <p>This website has been blocked by your content filter.</p>
    <code>{url}</code>
    <p class="brand">NETSENTRY</p>
  </div>
</body>
</html>
